<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="particles-js"></div>

    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-circuit"></div>
            <div class="loading-text">SYSTEM INITIALIZING...</div>
        </div>
    </div>

    <header class="header">
        <nav class="nav-container">
            <a href="#home" class="logo">
                <span class="tag">&lt;</span><span class="logo-text">AR_DEV</span><span class="tag">/&gt;</span>
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="#home" class="nav-link active">Home</a></li>
                <li><a href="#journey" class="nav-link">Journey</a></li>
                <li><a href="#skills" class="nav-link">Skills</a></li>
                <li><a href="#portfolio" class="nav-link">Portfolio</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="home">
    <div class="hero-container">
        <div class="hero-content">
            <h2 class="greeting">Hi, I'm</h2>
            <h1 class="name glitched-text">Achmad Ma'rufi<br><span class="highlight">Siddiq</span></h1>
            
            <div class="typing-container">
                <span class="static-text">I am </span>
                <span class="typing-text"></span>
            </div>

            <p class="description">
                Mahasiswa Teknik Elektro yang berfokus pada IoT, Power Systems, dan Web Development.
            </p>

            <div class="hero-actions">
                <a href="cv-achmad.pdf" download class="btn btn-primary"><i class="fas fa-file-pdf"></i> CV</a>
                <a href="#portfolio" class="btn btn-secondary">Projects</a>
            </div>

            <div class="social-links">
                <a href="https://github.com/username" class="social-icon"><i class="fab fa-github"></i></a>
                <a href="https://linkedin.com/in/username" class="social-icon"><i class="fab fa-linkedin"></i></a>
                <a href="https://instagram.com/username" class="social-icon"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <div class="hero-image">
            <div class="card-container">
                <div class="inner-container">
                    <div class="main-card">
                        <img src="images/profil.jpeg" alt="Achmad" class="profile-img-electric">
                    </div>
                    
                    <div class="content-container-electric">
                        <div class="content-top">
                            <div class="scrollbar-glass">EE STUDENT</div>
                            <p class="card-panggilan">ACHMAD</p>
                        </div>
                    </div>

                    <div class="glow-layer-1"></div>
                    <div class="glow-layer-2"></div>
                    <div class="background-glow"></div>
                </div>
            </div>

            <svg style="position: absolute; width: 0; height: 0;">
                <filter id="turbulent-displace">
                    <feTurbulence type="fractalNoise" baseFrequency="0.01 0.15" numOctaves="2" result="noise">
                        <animate attributeName="baseFrequency" dur="10s" values="0.01 0.15;0.02 0.25;0.01 0.15" repeatCount="indefinite" />
                    </feTurbulence>
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" />
                </filter>
            </svg>
        </div>
    </div>
</section>

    <section class="portfolio-section" id="portfolio">
        <div class="section-header">
            <h2 class="section-title">Selected <span class="highlight">Projects</span></h2>
        </div>
        <div class="carousel-container">
            <div class="carousel-3d" id="carousel"></div>
            <div class="carousel-controls">
                <button id="prevBtn" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
                <button id="nextBtn" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="script.js"></script>

</html>
